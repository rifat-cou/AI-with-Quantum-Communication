// ─────────────── STATE ──────────────────────────────────────────
let AP=0, AW=0;
const CK={};
const EX={};

function phaseWeeks(pid){return WEEKS.filter(w=>w.phase===pid);}
function allDays(){const r=[];WEEKS.forEach(w=>w.days.forEach(d=>r.push({wk:w.week,ph:w.phase,...d})));return r;}
function stats(){
  let tot=0,dn=0;
  const bph={},bwk={};
  WEEKS.forEach(w=>{
    bph[w.phase]=bph[w.phase]||{t:0,d:0};
    bwk[w.week]={t:0,d:0};
    w.days.forEach(d=>{tot++;bph[w.phase].t++;bwk[w.week].t++;
      if(CK[`${w.week}-${d.d}`]){dn++;bph[w.phase].d++;bwk[w.week].d++;}
    });
  });
  return{tot,dn,bph,bwk};
}
function pct(d,t){return t>0?Math.round(d/t*100):0;}
function setBar(id,v,c){const e=document.getElementById(id);if(e){e.style.width=Math.min(v,100)+'%';e.style.background=c;e.style.boxShadow=v>0?`0 0 5px ${c}60`:''}}
function ck(wk,d){return !!CK[`${wk}-${d}`];}
function toggleCk(wk,d,e){e.stopPropagation();const k=`${wk}-${d}`;CK[k]=!CK[k];renderAll();}
function toggleEx(wk,d){const k=`${wk}-${d}`;EX[k]=!EX[k];renderDays();}

function typeClass(t){if(t==='A')return'ta';if(t==='B')return'tb';if(t==='M')return'tm';return'tr';}
function typeBadge(t){if(t==='A')return'ba';if(t==='B')return'bb';if(t==='M')return'bm';return'br';}
function typeName(t){if(t==='A')return'TRACK A';if(t==='B')return'TRACK B';if(t==='M')return'MATH';return'RECAP';}
function typeColor(t){if(t==='A')return'#34D399';if(t==='B')return'#A78BFA';if(t==='M')return'#D97706';return'#60A5FA';}

function rl(l,u,type){return`<a href="${u}" target="_blank" rel="noopener noreferrer" class="rl ${type}"><span class="rl-t">${l}</span><span class="rl-i">↗</span></a>`;}

function buildDay(day,wk){
  const k=`${wk}-${day.d}`;
  const done=ck(wk,day.d);
  const open=EX[k];
  const tc=typeClass(day.t);
  const bc=typeBadge(day.t);
  const col=typeColor(day.t);
  const subsPreview=day.subs?day.subs.slice(0,2).join(' · ')+'…':'';
  const isRecap=day.t==='R';
  let body='';
  if(open){
    body=`<div class="day-body">`;
    if(day.subs&&day.subs.length){
      body+=`<div><div class="subs-lbl">${isRecap?'REVISION TASKS':'WHAT TO LEARN / DO'}</div>`;
      if(isRecap){
        body+=`<div class="recap-items">${day.subs.map(s=>`<div class="ri"><span style="color:${col};flex-shrink:0">↻</span><span>${s}</span></div>`).join('')}</div>`;
      } else {
        body+=day.subs.map(s=>`<div class="sub-item"><span class="sub-dot" style="color:${col}">▸</span><span>${s}</span></div>`).join('');
      }
      body+=`</div>`;
    }
    if((day.yt&&day.yt.length)||(day.web&&day.web.length)){
      body+=`<div class="res-grid">`;
      body+=`<div><div class="rlbl ryt"><svg width="9" height="9" viewBox="0 0 24 24" fill="currentColor"><path d="M22.54 6.42a2.78 2.78 0 0 0-1.95-1.96C18.88 4 12 4 12 4s-6.88 0-8.59.46A2.78 2.78 0 0 0 1.46 6.42 29 29 0 0 0 1 12a29 29 0 0 0 .46 5.58 2.78 2.78 0 0 0 1.95 1.96C5.12 20 12 20 12 20s6.88 0 8.59-.46a2.78 2.78 0 0 0 1.95-1.96A29 29 0 0 0 23 12a29 29 0 0 0-.46-5.58z"/><polygon points="9.75 15.02 15.5 12 9.75 8.98 9.75 15.02" fill="white"/></svg> YouTube</div><div class="rlinks">${(day.yt||[]).map(([l,u])=>rl(l,u,'rly')).join('')||'<span style="font-size:9px;color:#1A3550">—</span>'}</div></div>`;
      body+=`<div><div class="rlbl rwb"><svg width="9" height="9" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg> Resources</div><div class="rlinks">${(day.web||[]).map(([l,u])=>rl(l,u,'rlw')).join('')||'<span style="font-size:9px;color:#1A3550">—</span>'}</div></div>`;
      body+=`</div>`;
    }
    body+=`</div>`;
  }
  return`<div class="day ${tc}${done?' done':''}" id="day-${k}">
<div class="day-hdr" onclick="toggleEx(${wk},${day.d})">
  <button class="day-chk" id="chk-${k}" onclick="toggleCk(${wk},${day.d},event)">${done?'<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>':'<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="12" cy="12" r="10"/></svg>'}</button>
  <span class="day-badge ${bc}">Day ${day.d} · ${typeName(day.t)}</span>
  <div class="day-info">
    <div class="day-topic">${day.topic}</div>
    ${!open?`<div class="day-sub-preview">${subsPreview}</div>`:''}
  </div>
  <span class="day-arr">${open?'<svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="6 9 12 15 18 9"/></svg>':'<svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="9 18 15 12 9 6"/></svg>'}</span>
</div>
${body}
</div>`;
}

function renderDays(){
  const wkData=WEEKS.find(w=>w.week===AW);
  if(!wkData){document.getElementById('dcont').innerHTML='<div style="color:#132540;padding:20px">Select a week</div>';return;}
  const s=stats();
  const ws=s.bwk[AW]||{t:0,d:0};
  const ph=PHASES[AP];
  const wp=pct(ws.d,ws.t);
  document.getElementById('dcont').innerHTML=`
<div class="wk-hdr" style="border-left-color:${ph.color};border-color:${ph.color}18">
  <div class="wk-hdr-row">
    <div>
      <div class="wk-tag">WEEK ${AW} · ${ph.label}</div>
      <div class="wk-title">${wkData.theme}</div>
      <div class="wk-tags">${wkData.tags.map((t,i)=>{const cs=['#34D399','#A78BFA','#FDE68A'];const bs=['rgba(52,211,153,0.15)','rgba(167,139,250,0.15)','rgba(253,230,138,0.15)'];return`<span class="wk-tag-pill" style="color:${cs[i]||'#60A5FA'};border-color:${cs[i]||'#60A5FA'};background:${bs[i]||'rgba(96,165,250,0.1)'}">${t}</span>`;}).join('')}</div>
    </div>
    <div><div class="wk-pct" id="wp">${wp}<span style="font-size:9.5px">%</span></div><div class="wk-done" id="wd">${ws.d}/${ws.t} done</div></div>
  </div>
  <div class="bw bh4"><div class="bf" id="wb" style="width:${wp}%;background:${ph.color}"></div></div>
</div>
<div class="days">${wkData.days.map(d=>buildDay(d,AW)).join('')}</div>`;
}

function renderSidebar(){
  const s=stats();
  const weeks=phaseWeeks(AP);
  const ph=PHASES[AP];
  document.getElementById('wsb').innerHTML=weeks.map(w=>{
    const ws=s.bwk[w.week]||{t:0,d:0};
    const dots=w.days.map(d=>`<div class="wk-dot${ck(w.week,d.d)?' done':''}${d.t==='R'?' recap':''}"></div>`).join('');
    return`<div class="wk-item${w.week===AW?' on':''}" style="--pc:${ph.color}" onclick="selWeek(${w.week})">
<div class="wk-num">WEEK ${w.week}</div>
<div class="wk-theme">${w.theme}</div>
<div class="wk-prog"><div class="wk-dots">${dots}</div><span style="font-size:8px;color:#1A3550">${ws.d}/${ws.t}</span></div>
</div>`;
  }).join('');
}

function renderTabs(){
  const s=stats();
  document.getElementById('ptabs').innerHTML=PHASES.map((ph,i)=>{
    const ps=s.bph[ph.id]||{t:0,d:0};
    return`<div class="pt${i===AP?' on':''}" style="--pc:${ph.color}" onclick="selPhase(${ph.id})">
<div class="pt-l">${ph.label}</div>
<div class="pt-c">${ps.d}/${ps.t} · ${pct(ps.d,ps.t)}%</div>
</div>`;
  }).join('');
}

function renderAll(){
  const s=stats();
  const op=pct(s.dn,s.tot);
  document.getElementById('op').innerHTML=op+'<span style="font-size:10px">%</span>';
  document.getElementById('oc').textContent=s.dn+'/'+s.tot+' days';
  setBar('ob',op,'#1D67D4');
  renderTabs();
  renderSidebar();
  renderDays();
}

function selPhase(id){AP=id;const pws=phaseWeeks(id);if(pws.length)AW=pws[0].week;renderAll();}
function selWeek(w){AW=w;renderSidebar();renderDays();}


// Reorder weeks: Recap on Day 4 and Day 7 (was Day 6 and Day 7)
// Original order: [d1,d2,d3,d4,d5,d6R,d7R]
// New order:      [d1,d2,d3,d6R->d4, d4->d5, d5->d6, d7R]
WEEKS.forEach(function(w){
  var d=w.days;
  if(d.length===7){
    var r=[d[0],d[1],d[2],d[5],d[3],d[4],d[6]];
    r.forEach(function(day,i){day.d=i+1;});
    w.days=r;
  }
});

// Init
AW=WEEKS[0].week;
renderAll();
</script>
